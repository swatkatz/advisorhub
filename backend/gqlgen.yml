schema:
  - ../schema.graphql

exec:
  package: graph
  layout: single-file
  filename: internal/graph/generated.go

model:
  filename: internal/graph/model/models_gen.go
  package: model

resolver:
  package: graph
  layout: follow-schema
  dir: internal/graph
  filename_template: "{name}.resolvers.go"

models:
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.ID
      - github.com/99designs/gqlgen/graphql.Int
      - github.com/99designs/gqlgen/graphql.Int64
      - github.com/99designs/gqlgen/graphql.Int32
  Int:
    model:
      - github.com/99designs/gqlgen/graphql.Int32
  DateTime:
    model:
      - github.com/swatkatz/advisorhub/backend/internal/graph.DateTime
  Date:
    model:
      - github.com/swatkatz/advisorhub/backend/internal/graph.Date
  Client:
    fields:
      household:
        resolver: true
      accounts:
        resolver: true
      externalAccounts:
        resolver: true
      aum:
        resolver: true
      health:
        resolver: true
      alerts:
        resolver: true
      actionItems:
        resolver: true
      goals:
        resolver: true
      notes:
        resolver: true
  Household:
    fields:
      members:
        resolver: true
  Alert:
    fields:
      client:
        resolver: true
      linkedActionItems:
        resolver: true
  ActionItem:
    fields:
      client:
        resolver: true
      alert:
        resolver: true
  Transfer:
    fields:
      client:
        resolver: true
